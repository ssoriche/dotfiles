# Flox global environment — mirrors devbox global packages
# Evaluate alongside devbox; fish shell prefers Flox when available
#
# Package groups isolate nixpkgs revisions so fast-moving or
# ABI-coupled packages can upgrade independently.  Packages without
# an explicit pkg-group share the implicit "toplevel" group.

schema-version = "1.11.0"

[install]
# Search / Navigation
ripgrep.pkg-path = "ripgrep"
fd.pkg-path = "fd"
fzf.pkg-path = "fzf"
fzf.version = ">=0.65.1"
eza.pkg-path = "eza"
eza.version = ">=0.23.0"
tree.pkg-path = "tree"
zoxide.pkg-path = "zoxide"
zoxide.version = ">=0.9.8"
yazi.pkg-path = "yazi"
yazi.version = ">=25.5.31"

# Text / JSON processing
bat.pkg-path = "bat"
jq.pkg-path = "jq"
jq.version = ">=1.8.1"
jq.outputs = "all"
jless.pkg-path = "jless"
jnv.pkg-path = "jnv"
jnv.version = ">=0.6.1"
fastgron.pkg-path = "fastgron"
fx.pkg-path = "fx"
fx.version = ">=38.0.0"
sd.pkg-path = "sd"

# Shells / Shell enhancements
atuin.pkg-path = "atuin"
direnv.pkg-path = "direnv"
direnv.version = ">=2.37.1"

# Kubernetes
kustomize = { pkg-path = "kustomize", pkg-group = "kubernetes" }
krew = { pkg-path = "krew", pkg-group = "kubernetes" }
kns = { pkg-path = "kns", pkg-group = "kubernetes" }

# Networking / Security
nmap.pkg-path = "nmap"
nmap.version = ">=7.97"
age.pkg-path = "age"
passage.pkg-path = "passage"
step-cli.pkg-path = "step-cli"
wget.pkg-path = "wget"
_1password-cli.pkg-path = "_1password-cli"
_1password-cli.version = ">=2.31.1"

# System monitoring / Utilities
btop.pkg-path = "btop"
btop.version = ">=1.4.4"
pv.pkg-path = "pv"
pv.version = ">=1.9.34"
ncdu.pkg-path = "ncdu"
ncdu.version = ">=2.8.2"
spacer.pkg-path = "spacer"
spacer.version = ">=0.4.5"
moreutils.pkg-path = "moreutils"
tldr.pkg-path = "tldr"
tldr.outputs = "all"
chezmoi.pkg-path = "chezmoi"
chezmoi.version = ">=2.63.1"
q.pkg-path = "q"
q.version = ">=0.19.5"
dyff.pkg-path = "dyff"

# Recording
asciinema.pkg-path = "asciinema"
asciinema.outputs = "all"
asciinema-agg.pkg-path = "asciinema-agg"

# Virtualization
lima.pkg-path = "lima"
lima.version = ">=1.2.0"

# Backup
restic.pkg-path = "restic"

# macOS SDK frameworks (needed by some builds)
CoreServices.pkg-path = "darwin.apple_sdk.frameworks.CoreServices"

# --- Grouped packages (inline tables) ---

# vcs — ecosystem tools share a revision
git = { pkg-path = "git", pkg-group = "vcs" , outputs = "all" }
gh = { pkg-path = "gh", pkg-group = "vcs" }
tig = { pkg-path = "tig", pkg-group = "vcs" , outputs = "all" }
delta = { pkg-path = "delta", pkg-group = "vcs" }
difftastic = { pkg-path = "difftastic", pkg-group = "vcs" }
git-absorb = { pkg-path = "git-absorb", pkg-group = "vcs" }
git-credential-manager = { pkg-path = "git-credential-manager", pkg-group = "vcs" }
jujutsu = { pkg-path = "jujutsu", pkg-group = "vcs" }
gitu = { pkg-path = "gitu", pkg-group = "vcs" }
gh-dash = { pkg-path = "gh-dash", pkg-group = "vcs" }

# editors — neovim + language server ABI compatibility
neovim = { pkg-path = "neovim", pkg-group = "editors" }
lua-language-server = { pkg-path = "lua-language-server", pkg-group = "editors" }
tree-sitter = { pkg-path = "tree-sitter", pkg-group = "editors" }

# golang — linter must match Go version
go = { pkg-path = "go", version = "1.25", pkg-group = "golang" }
golangci-lint = { pkg-path = "golangci-lint", pkg-group = "golang" }

# node — JS runtimes
nodejs = { pkg-path = "nodejs", pkg-group = "node" }
bun = { pkg-path = "bun", pkg-group = "node" }

# lua — Lua ecosystem
luarocks = { pkg-path = "luarocks", pkg-group = "lua" }
lua = { pkg-path = "lua51Packages.lua", pkg-group = "lua" , outputs = "all" }

# python — standalone, frequent updates
uv = { pkg-path = "uv", pkg-group = "python" }

# linters — standalone analysis tools
typos = { pkg-path = "typos", pkg-group = "linters" }
dotenv-linter = { pkg-path = "dotenv-linter", pkg-group = "linters" }

# cloud — large package, independent update cadence
awscli2 = { pkg-path = "awscli2", pkg-group = "cloud" , outputs = "all" }

# pinned — version-locked packages
granted = { pkg-path = "granted", version = "0.36.3", pkg-group = "pinned" }

# claude — fast-moving, unfree
claude-code = { pkg-path = "claude-code", pkg-group = "claude" }

# opencode — fast-moving AI tooling
opencode = { pkg-path = "opencode", pkg-group = "opencode" }

# gui — avoid blocking CLI tool upgrades
aerospace = { pkg-path = "aerospace", pkg-group = "gui" }
wezterm = { pkg-path = "wezterm", pkg-group = "gui" }
obsidian = { pkg-path = "obsidian", pkg-group = "gui" }
halloy = { pkg-path = "halloy", pkg-group = "gui" }
maccy = { pkg-path = "maccy", pkg-group = "gui" }

# Flake-based packages (pinned to specific commits/repos)
coderabbit-cli.pkg-path = "flox/coderabbit-cli"
coderabbit-cli.pkg-group = "coderabbit-cli"
agent-safehouse.flake = "github:NixOS/nixpkgs/b0ec52b771f1207053090f4ea9cf73a6040f0489#agent-safehouse"


[hook]
on-activate = """
  export PATH="$HOME/.local/bin:$PATH"
"""

[profile]
bash = """
  setup-tools() {
    uv tool install --force --python python3.14 llm@latest
    uv tool install --force --python python3.14 aider@latest
    uv tool install --force --python python3.14 claude-code-transcripts
  }
  update-tools() {
    uv tool upgrade --all
  }
"""
fish = """
  function setup-tools
    uv tool install --force --python python3.14 llm@latest
    uv tool install --force --python python3.14 aider@latest
    uv tool install --force --python python3.14 claude-code-transcripts
  end
  function update-tools
    uv tool upgrade --all
  end
"""

[options]
systems = ["aarch64-darwin"]

[options.allow]
unfree = true

[options.activate]
mode = "run"

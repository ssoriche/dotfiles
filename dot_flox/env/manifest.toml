# Flox global environment — mirrors devbox global packages
# Evaluate alongside devbox; fish shell prefers Flox when available
#
# Package groups isolate nixpkgs revisions so fast-moving or
# ABI-coupled packages can upgrade independently.  Packages without
# an explicit pkg-group share the implicit "toplevel" group.

version = 1

[install]
# Search / Navigation
ripgrep.pkg-path = "ripgrep"
fd.pkg-path = "fd"
fzf.pkg-path = "fzf"
eza.pkg-path = "eza"
tree.pkg-path = "tree"
zoxide.pkg-path = "zoxide"
yazi.pkg-path = "yazi"

# Text / JSON processing
bat.pkg-path = "bat"
jq.pkg-path = "jq"
jless.pkg-path = "jless"
jnv.pkg-path = "jnv"
fastgron.pkg-path = "fastgron"
fx.pkg-path = "fx"
sd.pkg-path = "sd"

# Version control — git ecosystem tools share a revision
git.pkg-path = "git"
git.pkg-group = "git"
gh.pkg-path = "gh"
gh.pkg-group = "git"
tig.pkg-path = "tig"
tig.pkg-group = "git"
delta.pkg-path = "delta"
delta.pkg-group = "git"
difftastic.pkg-path = "difftastic"
difftastic.pkg-group = "git"
git-absorb.pkg-path = "git-absorb"
git-absorb.pkg-group = "git"
git-credential-manager.pkg-path = "git-credential-manager"
git-credential-manager.pkg-group = "git"
jujutsu.pkg-path = "jujutsu"
jujutsu.pkg-group = "git"
gitu.pkg-path = "gitu"
gitu.pkg-group = "git"

# Editors / Language servers — must stay compatible
neovim.pkg-path = "neovim"
neovim.pkg-group = "editors"
lua-language-server.pkg-path = "lua-language-server"
lua-language-server.pkg-group = "editors"
tree-sitter.pkg-path = "tree-sitter"
tree-sitter.pkg-group = "editors"

# Shells / Shell enhancements
direnv.pkg-path = "direnv"

# Languages / Runtimes
nodejs.pkg-path = "nodejs"
nodejs.pkg-group = "node"
bun.pkg-path = "bun"
bun.pkg-group = "node"

go.pkg-path = "go"
go.version = "1.24"
go.pkg-group = "go"
golangci-lint.pkg-path = "golangci-lint"
golangci-lint.pkg-group = "go"

uv.pkg-path = "uv"
uv.pkg-group = "python"

luarocks.pkg-path = "luarocks"
luarocks.pkg-group = "lua"
lua.pkg-path = "lua51Packages.lua"
lua.pkg-group = "lua"

# Linters / Analysis
typos.pkg-path = "typos"
typos.pkg-group = "linters"
dotenv-linter.pkg-path = "dotenv-linter"
dotenv-linter.pkg-group = "linters"

# Kubernetes
kustomize.pkg-path = "kustomize"

# Networking / Security
nmap.pkg-path = "nmap"
age.pkg-path = "age"
passage.pkg-path = "passage"
step-cli.pkg-path = "step-cli"
wget.pkg-path = "wget"
_1password-cli.pkg-path = "_1password-cli"

# Cloud
awscli2.pkg-path = "awscli2"
awscli2.pkg-group = "cloud"
granted.pkg-path = "granted"
granted.version = "0.36.3"
granted.pkg-group = "pinned"

# System monitoring / Utilities
btop.pkg-path = "btop"
pv.pkg-path = "pv"
ncdu.pkg-path = "ncdu"
spacer.pkg-path = "spacer"
moreutils.pkg-path = "moreutils"
tldr.pkg-path = "tldr"
chezmoi.pkg-path = "chezmoi"
q.pkg-path = "q"
dyff.pkg-path = "dyff"

# Recording
asciinema.pkg-path = "asciinema"
asciinema-agg.pkg-path = "asciinema-agg"

# Virtualization
lima.pkg-path = "lima"

# Backup
restic.pkg-path = "restic"

# AI / LLM
claude-code.pkg-path = "claude-code"
claude-code.pkg-group = "claude"

# GUI Applications — avoid blocking CLI tool upgrades
aerospace.pkg-path = "aerospace"
aerospace.pkg-group = "gui"
wezterm.pkg-path = "wezterm"
wezterm.pkg-group = "gui"
obsidian.pkg-path = "obsidian"
obsidian.pkg-group = "gui"
halloy.pkg-path = "halloy"
halloy.pkg-group = "gui"

# macOS SDK frameworks (needed by some builds)
CoreServices.pkg-path = "darwin.apple_sdk.frameworks.CoreServices"

# Flake-based packages (pinned to specific commits/repos)
atuin.flake = "github:atuinsh/atuin/v18.10.0"
maccy.flake = "github:NixOS/nixpkgs/9ccc4f514369dd2e94af75d0132772f5927e26bb#maccy"
beads.flake = "github:steveyegge/beads#default"

[hook]
on-activate = """
  export PATH="$HOME/.local/bin:$PATH"
"""

[profile]
bash = """
  setup-tools() {
    uv tool install --force --python python3.14 llm@latest
    uv tool install --force --python python3.14 aider@latest
    uv tool install --force --python python3.14 claude-code-transcripts
  }
  update-tools() {
    uv tool upgrade --all
  }
"""
fish = """
  function setup-tools
    uv tool install --force --python python3.14 llm@latest
    uv tool install --force --python python3.14 aider@latest
    uv tool install --force --python python3.14 claude-code-transcripts
  end
  function update-tools
    uv tool upgrade --all
  end
"""

[options]
systems = ["aarch64-darwin"]

[options.allow]
unfree = true

[options.activate]
mode = "run"
